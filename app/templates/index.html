<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>LTX Studio — 22B Distilled Low VRAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & tokens ───────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #09090b;
    --surface:  #111115;
    --border:   #1e1e24;
    --border2:  #2a2a34;
    --text:     #e8e8f0;
    --muted:    #6b6b80;
    --accent:   #c8ff4a;        /* acid green — the one unforgettable colour */
    --accent2:  #7b5ff5;        /* deep violet for secondary actions */
    --danger:   #ff4a6b;
    --radius:   6px;
    --mono:     'DM Mono', monospace;
    --display:  'Syne', sans-serif;
  }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100%;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow-x: hidden;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .35;
  }

  /* ── Header ────────────────────────────────────────────────── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(9,9,11,.85);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em;
  }
  .logo span { color: var(--accent); }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: .75rem;
    color: var(--muted);
    padding: 5px 12px;
    border: 1px solid var(--border2);
    border-radius: 20px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #444; transition: background .4s;
  }
  .status-dot.ready  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.loading { background: #f5a623; animation: pulse 1s infinite; }
  .status-dot.error  { background: var(--danger); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Main layout ───────────────────────────────────────────── */
  main {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    height: calc(100vh - 61px);
    overflow: hidden;
  }

  /* ── Panel (left sidebar) ──────────────────────────────────── */
  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 28px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }

  /* ── Section labels ────────────────────────────────────────── */
  .section-label {
    font-size: .65rem; font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }

  /* ── Form controls ─────────────────────────────────────────── */
  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: .7rem; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted);
  }

  textarea, input[type="text"], input[type="number"], select {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono); font-size: .8rem;
    padding: 10px 12px;
    outline: none; transition: border-color .2s;
    width: 100%;
  }
  textarea:focus, input:focus { border-color: var(--accent2); }
  textarea { resize: vertical; min-height: 90px; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* range slider */
  .slider-field { display: flex; flex-direction: column; gap: 6px; }
  .slider-header { display: flex; justify-content: space-between; align-items: center; }
  .slider-val {
    font-family: var(--mono); font-size: .75rem;
    color: var(--accent); background: rgba(200,255,74,.1);
    padding: 2px 8px; border-radius: 3px;
  }
  input[type="range"] {
    width: 100%; height: 4px;
    -webkit-appearance: none;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct,50%), var(--border2) var(--pct,50%));
    border-radius: 2px; cursor: pointer; border: none; padding: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg);
    box-shadow: 0 0 6px rgba(200,255,74,.5);
  }

  /* toggle */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border2);
    border-radius: var(--radius);
  }
  .toggle-label { font-size: .75rem; color: var(--text); }
  .toggle-sub   { font-size: .65rem; color: var(--muted); }
  .toggle {
    position: relative; width: 36px; height: 20px;
    flex-shrink: 0;
  }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-track {
    position: absolute; inset: 0; cursor: pointer;
    background: var(--border2); border-radius: 20px; transition: background .2s;
  }
  .toggle-thumb {
    position: absolute; height: 14px; width: 14px;
    left: 3px; top: 3px; background: white; border-radius: 50%;
    transition: transform .2s;
  }
  .toggle input:checked ~ .toggle-track { background: var(--accent); }
  .toggle input:checked ~ .toggle-track .toggle-thumb { transform: translateX(16px); }

  /* generate button */
  .btn-generate {
    width: 100%; padding: 14px;
    background: var(--accent); color: #09090b;
    font-family: var(--display); font-size: .85rem; font-weight: 800;
    letter-spacing: .05em; text-transform: uppercase;
    border: none; border-radius: var(--radius); cursor: pointer;
    transition: all .2s; position: relative; overflow: hidden;
  }
  .btn-generate:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled {
    background: var(--border2); color: var(--muted);
    cursor: not-allowed; transform: none; filter: none;
  }
  .btn-generate .btn-loader {
    display: none; position: absolute; inset: 0;
    background: var(--accent);
    align-items: center; justify-content: center;
  }
  .btn-generate.loading .btn-loader { display: flex; }
  .btn-generate.loading .btn-text   { visibility: hidden; }

  /* spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(9,9,11,.3);
    border-top-color: #09090b;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Canvas (right) ────────────────────────────────────────── */
  .canvas {
    display: flex; flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  .canvas-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .canvas-title { font-size: .75rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

  .btn-download {
    display: none; align-items: center; gap: 6px;
    padding: 7px 14px;
    background: transparent; border: 1px solid var(--border2);
    color: var(--text); font-family: var(--display);
    font-size: .7rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    border-radius: var(--radius); cursor: pointer; text-decoration: none;
    transition: all .2s;
  }
  .btn-download:hover { border-color: var(--accent); color: var(--accent); }
  .btn-download.visible { display: flex; }

  .canvas-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px; gap: 24px;
    position: relative;
  }

  /* idle state */
  .idle-art {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px; opacity: .35;
    transition: opacity .4s;
  }
  .idle-grid {
    display: grid; grid-template-columns: repeat(6,1fr); gap: 4px;
  }
  .idle-cell {
    width: 28px; height: 28px; border-radius: 3px;
    background: var(--border2);
    animation: cellPulse 3s ease-in-out infinite;
  }
  .idle-cell:nth-child(odd)  { animation-delay: .2s; }
  .idle-cell:nth-child(3n)   { animation-delay: .5s; }
  .idle-cell:nth-child(5n)   { animation-delay: .8s; }
  @keyframes cellPulse { 0%,100%{opacity:.3} 50%{opacity:.7} }
  .idle-text { font-size: .75rem; color: var(--muted); font-family: var(--mono); }

  /* progress */
  .progress-wrap { display: none; width: 100%; max-width: 420px; flex-direction: column; gap: 16px; align-items: center; }
  .progress-wrap.visible { display: flex; }
  .progress-label { font-family: var(--mono); font-size: .75rem; color: var(--muted); }
  .progress-bar-bg {
    width: 100%; height: 3px;
    background: var(--border2); border-radius: 2px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px; transition: width .5s ease;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0%   { filter: brightness(1); }
    50%  { filter: brightness(1.3); }
    100% { filter: brightness(1); }
  }

  /* video result */
  .result-wrap { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
  .result-wrap.visible { display: flex; }
  video {
    max-width: 100%; max-height: calc(100vh - 220px);
    border-radius: 8px; border: 1px solid var(--border2);
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
  }
  .result-meta {
    font-family: var(--mono); font-size: .7rem; color: var(--muted);
    display: flex; gap: 20px;
  }
  .result-meta span { color: var(--text); }

  /* error toast */
  .error-banner {
    display: none;
    position: fixed; bottom: 24px; right: 24px;
    background: rgba(255,74,107,.1); border: 1px solid var(--danger);
    color: var(--danger); padding: 12px 20px;
    border-radius: var(--radius); font-family: var(--mono); font-size: .75rem;
    z-index: 100; max-width: 360px;
  }
  .error-banner.visible { display: block; }

  /* responsive */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .canvas { display: none; }
  }
</style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────── -->
<header>
  <div class="logo">LTX <span>Studio</span></div>
  <div class="status-pill">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading model…</span>
  </div>
</header>

<!-- ── Main ─────────────────────────────────────────────────────── -->
<main>

  <!-- LEFT: controls panel -->
  <div class="panel">

    <!-- Prompt -->
    <div class="field">
      <label>Prompt</label>
      <textarea id="prompt" placeholder="A cinematic drone shot over misty mountain peaks at golden hour, slow pan left, birds flying in the distance…"></textarea>
    </div>

    <div class="field">
      <label>Negative Prompt</label>
      <textarea id="negPrompt" style="min-height:52px" placeholder="blurry, low quality, still frame, watermark, overlay, titles">blurry, low quality, still frame, watermark, overlay, titles</textarea>
    </div>

    <!-- Resolution -->
    <div>
      <div class="section-label">Resolution (output after 2× upscale)</div>
      <div class="row">
        <div class="field">
          <label>Width</label>
          <select id="width">
            <option value="512">512</option>
            <option value="640">640</option>
            <option value="768">768</option>
            <option value="900" selected>900</option>
            <option value="960">960</option>
            <option value="1280">1280</option>
            <option value="1600">1600</option>
          </select>
        </div>
        <div class="field">
          <label>Height</label>
          <select id="height">
            <option value="320">320</option>
            <option value="448">448</option>
            <option value="512">512</option>
            <option value="544">544</option>
            <option value="720">720</option>
            <option value="900">900</option>
            <option value="1600" selected>1600</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Duration / FPS -->
    <div class="row">
      <div class="field">
        <label>Duration (seconds)</label>
        <select id="duration">
          <option value="2">2s</option>
          <option value="4">4s</option>
          <option value="6">6s</option>
          <option value="8">8s</option>
          <option value="10">10s</option>
          <option value="15">15s</option>
          <option value="20" selected>20s</option>
        </select>
      </div>
      <div class="field">
        <label>FPS</label>
        <select id="fps">
          <option value="24" selected>24</option>
          <option value="30">30</option>
        </select>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-top:-18px">
      Frames: <span id="frameCount">481</span> · ~<span id="estTime">20–25</span> min generation
    </div>

    <!-- CFG slider -->
    <div class="slider-field">
      <div class="slider-header">
        <label>Guidance Scale (CFG)</label>
        <span class="slider-val" id="cfgVal">1.0</span>
      </div>
      <input type="range" id="cfg" min="1" max="8" step="0.5" value="1"
             oninput="syncSlider(this,'cfgVal')" />
    </div>

    <!-- Seed -->
    <div class="field">
      <label>Seed <span style="font-weight:400;text-transform:none;letter-spacing:0">(-1 = random)</span></label>
      <input type="number" id="seed" value="-1" min="-1" max="4294967295" />
    </div>

    <!-- Generate button -->
    <button class="btn-generate" id="generateBtn" onclick="generate()">
      <span class="btn-text">Generate Video</span>
      <div class="btn-loader"><div class="spinner"></div></div>
    </button>

  </div><!-- /panel -->

  <!-- RIGHT: canvas -->
  <div class="canvas">
    <div class="canvas-toolbar">
      <span class="canvas-title">Preview</span>
      <a class="btn-download" id="downloadBtn" download="ltx-output.mp4">
        ↓ Download
      </a>
    </div>

    <div class="canvas-body">

      <!-- idle art -->
      <div class="idle-art" id="idleArt">
        <div class="idle-grid">
          <div class="idle-cell" style="background:rgba(200,255,74,.15)"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell" style="background:rgba(123,95,245,.2)"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell" style="background:rgba(200,255,74,.08)"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell" style="background:rgba(123,95,245,.15)"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell" style="background:rgba(200,255,74,.2)"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell" style="background:rgba(200,255,74,.1)"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell" style="background:rgba(123,95,245,.25)"></div>
          <div class="idle-cell"></div>
          <div class="idle-cell" style="background:rgba(200,255,74,.12)"></div>
        </div>
        <div class="idle-text">// awaiting generation</div>
      </div>

      <!-- progress -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label" id="progressLabel">Queuing…</div>
        <div class="progress-bar-bg">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <!-- result video -->
      <div class="result-wrap" id="resultWrap">
        <video id="resultVideo" controls autoplay loop></video>
        <div class="result-meta">
          Duration: <span id="metaDuration">—</span>
          &nbsp;&nbsp;Resolution: <span id="metaRes">—</span>
          &nbsp;&nbsp;Mode: <span id="metaMode">—</span>
        </div>
      </div>

    </div><!-- /canvas-body -->
  </div><!-- /canvas -->

</main>

<div class="error-banner" id="errorBanner"></div>

<script>
/* ── State ────────────────────────────────────────────────────── */
let currentJobId = null;
let pollTimer    = null;

/* ── Health check ─────────────────────────────────────────────── */
async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (d.status === 'ok') {
      dot.className  = 'status-dot ready';
      text.textContent = `Ready · ${d.model}`;
      document.getElementById('generateBtn').disabled = false;
    } else {
      dot.className  = 'status-dot loading';
      text.textContent = 'ComfyUI loading…';
      setTimeout(checkHealth, 3000);
    }
  } catch {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusText').textContent = 'Server unreachable';
    setTimeout(checkHealth, 5000);
  }
}

/* ── Slider sync ──────────────────────────────────────────────── */
function syncSlider(el, valId) {
  document.getElementById(valId).textContent = el.value;
  const pct = ((el.value - el.min) / (el.max - el.min)) * 100;
  el.style.setProperty('--pct', pct + '%');
}
// init sliders
['cfg'].forEach(id => {
  const el = document.getElementById(id);
  syncSlider(el, 'cfgVal');
});

// Duration ↔ frames calculator
function updateFrameCount() {
  const fps = parseInt(document.getElementById('fps').value);
  const dur = parseInt(document.getElementById('duration').value);
  const frames = dur * fps + 1;
  document.getElementById('frameCount').textContent = frames;
  // rough estimate: ~1 min per second of video at 900x1600
  const minTime = Math.round(dur * 1.0);
  const maxTime = Math.round(dur * 1.25);
  document.getElementById('estTime').textContent = `${minTime}–${maxTime}`;
}
document.getElementById('duration').addEventListener('change', updateFrameCount);
document.getElementById('fps').addEventListener('change', updateFrameCount);
updateFrameCount();

/* ── Generate ─────────────────────────────────────────────────── */
async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { showError('Please enter a prompt.'); return; }

  // Build form data
  const fps = parseInt(document.getElementById('fps').value);
  const dur = parseInt(document.getElementById('duration').value);
  const numFrames = dur * fps + 1;

  const fd = new FormData();
  fd.append('prompt',           prompt);
  fd.append('negative_prompt',  document.getElementById('negPrompt').value);
  fd.append('width',            document.getElementById('width').value);
  fd.append('height',           document.getElementById('height').value);
  fd.append('num_frames',       numFrames);
  fd.append('frame_rate',       fps);
  fd.append('cfg',              document.getElementById('cfg').value);
  fd.append('seed',             document.getElementById('seed').value);

  // UI → loading
  setGenerating(true);
  showProgress('Sending to ComfyUI…', 2);
  hideResult();

  try {
    const r = await fetch('/generate', { method: 'POST', body: fd });
    if (!r.ok) throw new Error((await r.json()).detail);
    const { job_id } = await r.json();
    currentJobId = job_id;
    pollStatus(job_id);
  } catch (e) {
    showError(e.message);
    setGenerating(false);
    hideProgress();
  }
}

/* ── Poll status ──────────────────────────────────────────────── */
function pollStatus(jobId) {
  clearInterval(pollTimer);
  let fakeProgress = 5;

  pollTimer = setInterval(async () => {
    try {
      const r = await fetch(`/status/${jobId}`);
      const d = await r.json();

      if (d.status === 'queued') {
        showProgress('Queued…', fakeProgress);
      } else if (d.status === 'generating') {
        fakeProgress = Math.min(fakeProgress + 1.5, 88);
        showProgress('Generating…', fakeProgress);
      } else if (d.status === 'done') {
        clearInterval(pollTimer);
        showProgress('Done!', 100);
        setTimeout(() => {
          hideProgress();
          showResult(d.result);
          setGenerating(false);
        }, 600);
      } else if (d.status === 'error') {
        clearInterval(pollTimer);
        showError(d.error || 'Generation failed.');
        setGenerating(false);
        hideProgress();
      }
    } catch { /* network blip, keep polling */ }
  }, 1500);
}

/* ── UI helpers ───────────────────────────────────────────────── */
function setGenerating(on) {
  const btn = document.getElementById('generateBtn');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

function showProgress(label, pct) {
  document.getElementById('idleArt').style.opacity     = '0';
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressBar').style.width   = pct + '%';
}

function hideProgress() {
  document.getElementById('progressWrap').classList.remove('visible');
  document.getElementById('idleArt').style.opacity = '.35';
}

function showResult(url) {
  const video  = document.getElementById('resultVideo');
  video.src    = url;
  document.getElementById('resultWrap').classList.add('visible');

  const dl = document.getElementById('downloadBtn');
  dl.href = url;
  dl.classList.add('visible');

  // Meta
  document.getElementById('metaRes').textContent  =
    `${document.getElementById('width').value}×${document.getElementById('height').value}`;
  document.getElementById('metaMode').textContent = 'Text→Video';

  video.onloadedmetadata = () => {
    document.getElementById('metaDuration').textContent = video.duration.toFixed(1) + 's';
  };
}

function hideResult() {
  document.getElementById('resultWrap').classList.remove('visible');
  document.getElementById('downloadBtn').classList.remove('visible');
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 5000);
}

/* ── Boot ─────────────────────────────────────────────────────── */
document.getElementById('generateBtn').disabled = true;
checkHealth();
</script>
